<div class="chq">
  <p class="chq__label">{{ label() }}</p>
  <div class="chq__track" (mouseleave)="hover(null)">
    @for (step of steps(); track step) {
      <button
        class="chq__box"
        [class.chq__box--filled]="isFilled(step)"
        [class.chq__box--empty]="isEmpty(step)"
        type="button"
        [attr.aria-label]="step + ' von ' + max() + ' Chilis'"
        [attr.aria-pressed]="value() === step"
        (mouseenter)="hover(step)"
        (click)="select(step)"
      >
        {{ touched() ? '🌶️' : step }}
        <!--
          One per box, always rendered (not @if'd) so viewChildren('burstEl')
          resolves as soon as the component mounts — no waiting a tick for
          it to appear before the first burst can use it. Empty and
          pointer-events: none whenever this step isn't in activeSteps().
        -->
        <span
          #burstEl
          class="chq__burst"
          [class.chq__burst--active]="activeSteps().has(step)"
          aria-hidden="true"
        ></span>
      </button>
    }
  </div>
</div>
